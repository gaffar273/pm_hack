# Railway monorepo config — 6 services from one repo
# Each service overrides the start command via Railway dashboard
# See DEPLOY_RAILWAY.md for step-by-step instructions

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "npx tsx orchestrator/server.ts"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
